version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: foundry_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/foundry_db
    depends_on:
      - db

volumes:
  pgdata:
